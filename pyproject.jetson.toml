[project]
name = "wespeaker-deep-edge"
version = "0.1.23"
description = "WeSpeaker 声纹识别工具 — 独立的声纹注册与识别 CLI 工具（Jetson 服务端配置）"
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
authors = [
    { name = "WeSpeaker Contributors" }
]
keywords = ["speaker", "verification", "voice", "recognition", "speaker-identification"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Multimedia :: Sound/Audio :: Speech",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Operating System :: OS Independent",
]

dependencies = [
    "audiomentations>=0.43.1",
    "hdbscan>=0.8.40",
    "kaldiio",
    "numpy==1.26.4",
    "pyannote-audio>=3.3.2",
    "pydub>=0.25.0",
    "pyyaml==6.0.3",
    "scipy>=1.0",
    "silero-vad",
    "sounddevice==0.5.2",
    "soundfile>=0.13.1",
    "s3prl",
    "tqdm",
    "torch==2.8.0",
    "torchaudio==2.8.0",
    "torchvision==0.23.0",
    "umap-learn==0.5.6",
    # wespeaker 内置依赖（vendored _wespeaker/）
    "accelerate",
    "onnxruntime>=1.16.0,<2.0",
    "openai-whisper",
    "peft",
    "scikit-learn",
    "seaborn>=0.13.2",
    "matplotlib>=3.10.9",
]

[project.urls]
Homepage = "https://github.com/yourusername/wespeaker-deep-edge"
Documentation = "https://github.com/yourusername/wespeaker-deep-edge#readme"
Repository = "https://github.com/yourusername/wespeaker-deep-edge"
"Bug Tracker" = "https://github.com/yourusername/wespeaker-deep-edge/issues"

[project.scripts]
wespeaker-deep-edge = "wespeaker_deep_edge.client:main"
wespeaker-deep-edge-server = "wespeaker_deep_edge.server.cli:main"

[project.optional-dependencies]
client = [
    "websockets>=12.0",
    "numpy==1.26.4",
    "soundfile>=0.13.1",
]
server = [
    "websockets>=12.0",
    "numpy==1.26.4",
    "soundfile>=0.13.1",
    "torch==2.8.0",
    "torchaudio==2.8.0",
    "torchvision==0.23.0",
    "pyannote-audio>=3.3.2",
    "scipy>=1.0",
    "pydub>=0.25.0",
    "pyyaml==6.0.3",
    "silero-vad",
    "audiomentations>=0.43.1",
    "tqdm",
    "hdbscan>=0.8.40",
    "kaldiio",
    "s3prl",
    "umap-learn==0.5.6",
    "accelerate",
    "onnxruntime>=1.16.0,<2.0",
    "openai-whisper",
    "peft",
    "scikit-learn",
    "seaborn>=0.13.2",
    "matplotlib>=3.10.9",
]

[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
"wespeaker_deep_edge" = ["*.yaml", "*.yml", "*.json", "*.txt"]
"wespeaker_deep_edge._models" = ["**/*"]
"wespeaker_deep_edge._voiceprints" = ["**/*"]
"wespeaker_deep_edge._wespeaker" = ["**/*"]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "pytest-asyncio>=0.21",
    "black>=24.0",
    "isort>=5.0",
]

# ── Jetson AI Lab Index ──────────────────────────────────────────────────────
# torch / torchaudio / torchvision 从 Jetson AI Lab 的 aarch64 wheel 源安装。
# 用法:
#   uv sync --all-extras
#   # 或仅服务端:
#   uv sync --extra server
#
# pip 用户:
#   pip install --extra-index-url https://pypi.jetson-ai-lab.io/jp6/cu126/ \
#     "wespeaker-deep-edge[server]"
#
# 首次安装 uv 时，torch 等依赖会自动从下方 jetson 索引拉取。
# 如果直接传递 URL 安装:
#   uv add --no-cache https://pypi.jetson-ai-lab.io/jp6/cu126/+f/.../torch-2.8.0-...whl
#
[[tool.uv.index]]
name = "jetson"
url = "https://pypi.jetson-ai-lab.io/jp6/cu126/"
explicit = true

[tool.uv.sources]
torch = { index = "jetson" }
torchaudio = { index = "jetson" }
torchvision = { index = "jetson" }

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
asyncio_mode = "auto"
addopts = "-v --cov=src/wespeaker_deep_edge --cov-report=term-missing --cov-fail-under=25"

[tool.black]
line-length = 100
target-version = ["py310"]

[tool.isort]
profile = "black"
