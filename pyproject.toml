[project]
name = "wespeaker"
version = "0.1.0"
description = "WeSpeaker 声纹识别工具 — 独立的声纹注册与识别 CLI 工具"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "audiomentations>=0.43.1",
    "noisereduce>=3.0.3",
    "numpy>=2.4.4",
    "pyannote-audio>=4.0.4",
    "sounddevice>=0.4",
    "torch>=2.11.0",
    "torchaudio>=2.11.0",
]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "black>=24.0",
    "isort>=5.0",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v --cov=src/wespeaker --cov-report=term-missing --cov-fail-under=30"

[tool.black]
line-length = 100
target-version = ["py312"]

[tool.isort]
profile = "black"
line_length = 100
