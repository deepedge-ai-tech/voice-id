[project]
name = "wespeaker-deep-edge"
version = "0.1.3"
description = "WeSpeaker 声纹识别工具 — 独立的声纹注册与识别 CLI 工具"
readme = "README.md"
license = "MIT"
requires-python = ">=3.12"
authors = [
    { name = "WeSpeaker Contributors" }
]
keywords = ["speaker", "verification", "voice", "recognition", "speaker-identification"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Multimedia :: Sound/Audio :: Speech",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Operating System :: OS Independent",
]
dependencies = [
    "audiomentations>=0.43.1",
    "noisereduce>=3.0.3",
    "numpy>=2.4.4",
    "pedalboard>=0.9.0",
    "pyannote-audio>=4.0.4",
    "pydub>=0.25.0",
    "scipy>=1.0",
    "silero-vad>=5.1.2",
    "sounddevice>=0.4",
    "torch>=2.11.0",
    "torchaudio>=2.11.0",
]

[project.urls]
Homepage = "https://github.com/yourusername/wespeaker-deep-edge"
Documentation = "https://github.com/yourusername/wespeaker-deep-edge#readme"
Repository = "https://github.com/yourusername/wespeaker-deep-edge"
"Bug Tracker" = "https://github.com/yourusername/wespeaker-deep-edge/issues"

[project.scripts]
wespeaker-deep-edge = "wespeaker_deep_edge.wespeaker:main"

[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
"wespeaker_deep_edge" = ["*.yaml", "*.yml", "*.json", "*.txt"]
"wespeaker_deep_edge._models" = ["**/*"]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "black>=24.0",
    "isort>=5.0",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v --cov=src/wespeaker_deep_edge --cov-report=term-missing --cov-fail-under=30"

[tool.black]
line-length = 100
target-version = ["py312"]

[tool.isort]
profile = "black"
